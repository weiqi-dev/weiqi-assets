<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>日志 - 围棋智能助手</title>
  <style>
    /* 日志面板样式 */
    .log-panel {
      background: rgba(255,255,255,0.9);
      border-radius: 8px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    
    .log-header {
      background: #f8f9fa;
      padding: 12px 15px;
      font-weight: bold;
      color: #555;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .log-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .log-count {
      font-size: 14px;
      color: #555;
    }
    
    .log-header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1.2em;
      padding: 4px;
      transition: transform 0.2s ease;
      line-height: 1;
    }
    
    .icon-btn:hover { transform: scale(1.1); }
    
    .log-list {
      max-height: calc(100vh - 200px);
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.4;
      padding: 8px;
    }
    
    .log-entry {
      padding: 6px 8px;
      margin-bottom: 2px;
      border-radius: 4px;
      background: #f9f9f9;
      word-break: break-all;
      border-left: 3px solid #ddd;
    }
    
    .log-entry.error { border-left-color: #f44; background: #fff5f5; }
    .log-entry.warn { border-left-color: #f80; background: #fffaf0; }
    .log-entry.info { border-left-color: #08f; background: #f0f8ff; }
    .log-entry.debug { border-left-color: #888; }
    
    .log-time { color: #999; }
    .log-level { font-weight: bold; }
    .log-level.error { color: #f44; }
    .log-level.warn { color: #f80; }
    .log-level.info { color: #08f; }
    .log-level.debug { color: #888; }
    .log-tag { color: #666; }
    .log-message { color: #333; }
    
    .log-empty {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-size: 14px;
    }
    
    /* 确认对话框样式复用 ui.css */
    .confirm-message {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-top: 12px;
    }
  </style>
