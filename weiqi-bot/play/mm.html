  <!-- TensorFlow.js 配置：强制使用 WebGL backend（解决华为手机 GPU 兼容性问题） -->
  <script>
    // 设置环境变量，绕过 TensorFlow.js 的性能检查
    window.tfjs_flags = window.tfjs_flags || {};
    window.tfjs_flags.SOFTWARE_WEBGL_ENABLED = true;
    
    // 监听 TensorFlow.js 加载完成
    window.addEventListener('load', async () => {
      // 等待 tf 对象可用
      const checkTf = setInterval(async () => {
        if (window.tf) {
          clearInterval(checkTf);
          try {
            // 强制设置 WebGL backend
            await window.tf.setBackend('webgl');
            await window.tf.ready();
            console.log('[GPU] TensorFlow.js backend: ' + window.tf.getBackend());
          } catch (e) {
            console.error('[GPU] Failed to set WebGL backend:', e);
          }
        }
      }, 100);
      
      // 5秒后停止检查
      setTimeout(() => clearInterval(checkTf), 5000);
    });
  </script>
