<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>围棋 AI 助理</title>
    
    <!-- ONNX Runtime Web (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js"></script>
    
    <style>
        /* 重置所有样式，参考项目风格 + 微信聊天体验 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #5a3d7a 100%);
            background-attachment: fixed;
            height: 100vh;
            height: 100dvh; /* 动态视口高度 */
            overflow: hidden;
            color: #333;
        }
        
        /* 微信风格标题栏 - 白色文字 */
        .wechat-header {
            height: 44px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
        }
        
        .wechat-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        /* 聊天区域 - 全屏 + 限制宽度 */
        .chat-container {
            position: fixed;
            top: 44px;
            left: 0;
            right: 0;
            bottom: 50px; /* 输入框高度 */
            overflow-y: auto;
            background: #EDEDED; /* 微信灰色背景 */
            padding: 8px 0;
        }
        
        /* PC端限制宽度，居中显示 */
        @media (min-width: 600px) {
            .chat-container {
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                width: 100%;
                max-width: 520px;
                border-left: 1px solid rgba(0,0,0,0.1);
                border-right: 1px solid rgba(0,0,0,0.1);
            }
        }
        
        /* 消息气泡 */
        .message {
            margin-bottom: 12px;
            padding: 0 12px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            display: flex;
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 75%;
            padding: 10px 12px;
            border-radius: 4px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 16px;
            position: relative;
        }
        
        /* 用户消息 - 紫色渐变（原风格） */
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        /* AI 消息 - 灰色（原风格） */
        .message.assistant .message-content {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #e0e0e0;
        }
        
        /* 意图标签 - 紫色风格 */
        .intent-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: #e8e4f0;
            color: #667eea;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        /* 实体列表 - 蓝色风格 */
        .entity-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0 4px;
            font-size: 13px;
        }
        
        .entity-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .entity-item strong {
            color: #1976d2;
            font-weight: 600;
        }
        
        /* 输入框 - 微信风格 */
        .input-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #F7F7F7;
            border-top: 0.5px solid #D6D6D6;
            padding: 8px 10px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }
        
        /* PC端限制输入框宽度，与聊天区域对齐 */
        @media (min-width: 600px) {
            .input-container {
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                width: 100%;
                max-width: 520px;
                border-left: 1px solid rgba(0,0,0,0.1);
                border-right: 1px solid rgba(0,0,0,0.1);
            }
        }
        
        .input-textarea {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            resize: none;
            min-height: 36px;
            max-height: 100px;
            line-height: 1.4;
            font-family: inherit;
            box-sizing: border-box;
            color: #000;
            background: #FFF;
        }
        
        .input-textarea::placeholder {
            color: #B2B2B2;
        }
        
        /* 工具栏按钮 */
        .toolbar-btn {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: transparent;
            color: #000;
            flex-shrink: 0;
            padding: 0;
        }
        
        .send-btn {
            background: #07C160;
            color: #FFF;
            font-size: 16px;
        }
        
        .send-btn:disabled {
            background: #E8E8E8;
            color: #B2B2B2;
        }
        
        .intent-badge::before {
            content: '💬';
            font-size: 14px;
        }
        
        /* 状态提示 */
        .status {
            padding: 12px;
            background: rgba(232, 245, 233, 0.9);
            backdrop-filter: blur(10px);
            color: #2e7d32;
            border-radius: 12px;
            margin: 8px 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(46, 125, 50, 0.2);
        }
        
        /* Command Menu */
        .command-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 999;
        }
        
        .command-menu {
            position: fixed;
            bottom: 60px;
            right: 10px;
            width: 260px;
            background: #FFF;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: none;
            z-index: 1000;
            overflow: hidden;
            animation: slideUp 0.2s ease;
        }
        
        /* PC端菜单位置调整，与输入框对齐 */
        @media (min-width: 600px) {
            .command-menu {
                right: calc((100vw - 520px) / 2 + 10px);
            }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .command-item {
            padding: 12px 16px;
            border-bottom: 0.5px solid #E8E8E8;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .command-item:hover {
            background: #F7F7F7;
        }
        
        .command-item:last-child {
            border-bottom: none;
        }
        
        .command-icon {
            font-size: 20px;
        }
        
        .command-title {
            font-size: 16px;
            color: #000;
        }
        
        /* Markdown 内容样式 */
        .markdown-content {
            line-height: 1.4;
        }
        
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin: 12px 0 8px 0;
            font-weight: 600;
        }
        
        .markdown-content h1 { font-size: 1.2em; }
        .markdown-content h2 { font-size: 1.1em; }
        .markdown-content h3 { font-size: 1.0em; }
        
        .markdown-content ul,
        .markdown-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }
        
        .markdown-content li {
            margin: 4px 0;
        }
        
        .markdown-content strong {
            font-weight: 600;
            color: #667eea;
        }
        
        .markdown-content code {
            background: #f5f5f5;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        
        .markdown-content pre {
            background: #f5f5f5;
            padding: 8px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        .markdown-content blockquote {
            border-left: 3px solid #667eea;
            padding-left: 8px;
            margin: 8px 0;
            color: #666;
        }
        
        .markdown-content a {
            color: #667eea;
            text-decoration: none;
        }
        
        .markdown-content a:hover {
            text-decoration: underline;
        }
        
        /* 移动端键盘适配 */
        @supports (height: 100dvh) {
            body {
                height: 100dvh;
            }
        }
        
        /* 小屏幕优化 */
        @media (max-width: 360px) {
            .wechat-title {
                font-size: 16px;
            }
            
            .message-content {
                font-size: 15px;
            }
        }
    </style>
  <script type="module" crossorigin src="../assets/assistant/index-gt6Nf0z6.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/FavoriteService-C9LkU7xv.js">
  <link rel="modulepreload" crossorigin href="../assets/modulepreload-polyfill-BVSDYCMZ.js">
  <link rel="modulepreload" crossorigin href="../assets/SessionService-DEXH3GCo.js">
</head>
<body>
    <!-- 微信风格标题栏 -->
    <div class="wechat-header">
        <h1 class="wechat-title">围棋 AI 助理</h1>
    </div>
    
    <!-- 聊天区域 - 全屏 -->
    <div class="chat-container" id="chatContainer">
        <div class="status">
            <span>✅</span>
            <span id="loadingText">AI助理准备就绪，试试快捷指令或输入你的需求！</span>
        </div>
    </div>
    
    <!-- 输入框 - 固定底部 -->
    <div class="input-container">
        <textarea class="input-textarea" id="userInput" placeholder="输入您想做的事" disabled rows="1"></textarea>
        <input type="file" id="sgfUpload" accept=".sgf" style="display: none;">
        <button class="toolbar-btn" id="sgfBtn" title="上传 SGF 文件" onclick="document.getElementById('sgfUpload').click()">📄</button>
        <button class="toolbar-btn send-btn" id="sendBtn" onclick="sendMessage()" disabled title="发送">➤</button>
        <button class="toolbar-btn" onclick="toggleCommandMenu()" title="更多">⋮</button>
    </div>
    
    <!-- Command Menu -->
    <div class="command-menu-overlay" id="commandMenuOverlay" onclick="toggleCommandMenu()"></div>
    <div class="command-menu" id="commandMenu">
        <div class="command-item" onclick="clearAllHistory(); toggleCommandMenu();">
            <div class="command-icon">🗑️</div>
            <div class="command-title">清空历史</div>
        </div>
        <div class="command-item" onclick="exportHistory(); toggleCommandMenu();">
            <div class="command-icon">📤</div>
            <div class="command-title">导出历史</div>
        </div>
        <div class="command-item" onclick="window.location.href='../home/index.html'">
            <div class="command-icon">⊞</div>
            <div class="command-title">切换到传统模式</div>
        </div>
    </div>

    <script src="../shared/error-catch.js"></script>
    
    <!-- 移动端键盘适配 -->
    <script>
        console.log('[键盘适配] 脚本加载');
        
        // 方法1：监听 visualViewport 变化（现代浏览器）
        if (window.visualViewport) {
            console.log('[键盘适配] visualViewport 支持');
            
            window.visualViewport.addEventListener('resize', () => {
                const inputContainer = document.querySelector('.input-container');
                const chatContainer = document.querySelector('.chat-container');
                
                if (!inputContainer || !chatContainer) {
                    console.log('[键盘适配] 找不到元素');
                    return;
                }
                
                const viewportHeight = window.visualViewport.height;
                const windowHeight = window.innerHeight;
                const keyboardHeight = windowHeight - viewportHeight;
                
                console.log('[键盘适配] 视口高度:', viewportHeight, '窗口高度:', windowHeight, '键盘高度:', keyboardHeight);
                
                // 键盘弹出时，输入框上移
                if (keyboardHeight > 50) {
                    console.log('[键盘适配] 键盘弹出，上移输入框');
                    inputContainer.style.transform = `translateY(-${keyboardHeight}px)`;
                    chatContainer.style.bottom = `${50 + keyboardHeight}px`;
                    
                    // 滚动到底部
                    setTimeout(() => {
                        if (chatContainer) {
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                    }, 100);
                } else {
                    console.log('[键盘适配] 键盘收起，恢复原位');
                    inputContainer.style.transform = '';
                    chatContainer.style.bottom = '50px';
                }
            });
        } else {
            console.log('[键盘适配] visualViewport 不支持，使用 resize 监听');
            
            // 方法2：监听 window.resize（后备方案）
            let lastHeight = window.innerHeight;
            
            window.addEventListener('resize', () => {
                const inputContainer = document.querySelector('.input-container');
                const chatContainer = document.querySelector('.chat-container');
                
                if (!inputContainer || !chatContainer) return;
                
                const currentHeight = window.innerHeight;
                const heightDiff = lastHeight - currentHeight;
                
                console.log('[键盘适配] resize - 高度差:', heightDiff);
                
                if (heightDiff > 100) {
                    // 键盘弹出
                    console.log('[键盘适配] 键盘弹出（resize）');
                    inputContainer.style.transform = `translateY(-${heightDiff}px)`;
                    chatContainer.style.bottom = `${50 + heightDiff}px`;
                } else if (heightDiff < -100) {
                    // 键盘收起
                    console.log('[键盘适配] 键盘收起（resize）');
                    inputContainer.style.transform = '';
                    chatContainer.style.bottom = '50px';
                }
                
                lastHeight = currentHeight;
            });
        }
        
        // 方法3：输入框聚焦时强制滚动到可视区域
        const userInput = document.getElementById('userInput');
        if (userInput) {
            userInput.addEventListener('focus', () => {
                console.log('[键盘适配] 输入框聚焦');
                
                // 多次尝试滚动，确保键盘弹出后能正确滚动
                const scrollToInput = () => {
                    const inputContainer = document.querySelector('.input-container');
                    if (inputContainer) {
                        inputContainer.scrollIntoView({ 
                            behavior: 'smooth', 
                            block: 'end',
                            inline: 'nearest'
                        });
                    }
                };
                
                // 立即尝试
                scrollToInput();
                
                // 延迟尝试（等待键盘动画）
                setTimeout(scrollToInput, 100);
                setTimeout(scrollToInput, 300);
                setTimeout(scrollToInput, 500);
            });
            
            // 监听输入框失焦
            userInput.addEventListener('blur', () => {
                console.log('[键盘适配] 输入框失焦');
                const inputContainer = document.querySelector('.input-container');
                const chatContainer = document.querySelector('.chat-container');
                
                if (inputContainer) {
                    inputContainer.style.transform = '';
                }
                if (chatContainer) {
                    chatContainer.style.bottom = '50px';
                }
            });
        }
    </script>
</body>
</html>
