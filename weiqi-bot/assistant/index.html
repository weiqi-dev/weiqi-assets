<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>围棋 AI 助理 - 围棋智能助手</title>
    
    <!-- ONNX Runtime Web (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js"></script>
    
    <style>
        /* assistant 特有样式：内容区域需要 flex 布局 */
        .glass-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            position: relative; /* 为菜单提供定位参考 */
        }
        
        .chat-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 16px;
            min-height: 0;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: transparent;
        }
        
        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            display: flex;
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .message.assistant .message-content {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #e0e0e0;
        }
        
        .intent-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #e8e4f0;
            color: #667eea;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 12px;
        }
        
        .intent-badge::before {
            content: '💬';
            font-size: 14px;
        }
        
        .entity-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0 4px;
            font-size: 13px;
        }
        
        .entity-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 12px;
            font-size: 12px;
            max-width: 100%;
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }
        
        .entity-item strong {
            color: #1976d2;
            font-weight: 600;
        }
        
        /* ChatGPT 风格输入框 - 玻璃拟态 */
        .input-container {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: border-color 0.3s;
        }
        
        .input-container:focus-within {
            border-color: #667eea;
        }
        
        .input-textarea {
            width: 100%;
            padding: 14px 16px 4px;
            border: none;
            font-size: 15px;
            outline: none;
            resize: none;
            min-height: 52px;
            max-height: 120px;
            line-height: 1.5;
            font-family: inherit;
            box-sizing: border-box;
            color: #333;
            background: transparent;
        }
        
        .input-textarea::placeholder {
            color: rgba(255,255,255,0.7);
        }
        
        .input-toolbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            padding: 4px 12px 8px;
            background: transparent;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .toolbar-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            transition: opacity 0.2s;
            flex-shrink: 0;
            background: transparent;
            color: #666;
        }
        
        .send-btn:hover:not(:disabled) {
            color: #555;
        }
        
        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .menu-btn:hover {
            color: #555;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            text-decoration: none;
        }
        
        .action-btn:hover {
            background: #764ba2;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.3);
        }
        
        .action-btn::after {
            content: '→';
            font-size: 14px;
        }
        
        .status {
            padding: 16px;
            background: rgba(232, 245, 233, 0.9);
            backdrop-filter: blur(10px);
            color: #2e7d32;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(46, 125, 50, 0.2);
        }
        
        /* Command Menu */
        .command-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 999;
        }
        
        .command-menu {
            position: absolute; /* 改为绝对定位，相对于 glass-content */
            bottom: 75px; /* 距离 glass-content 底部 75px（输入框高度 + 间距） */
            right: 10px; /* 距离 glass-content 右侧 10px */
            width: 280px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .command-menu-header {
            padding: 14px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .command-list {
            max-height: 280px;
            overflow-y: auto;
        }
        
        .command-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .command-item:hover {
            background: #f8f9fa;
        }
        
        .command-item:last-child {
            border-bottom: none;
        }
        
        .command-icon {
            font-size: 1.3em;
        }
        
        .command-text {
            flex: 1;
        }
        
        .command-title {
            font-weight: 500;
            color: #333;
            margin-bottom: 2px;
            font-size: 0.95em;
        }
        
        .command-desc {
            font-size: 11px;
            color: #888;
        }
        
        /* Typing indicator */
        .typing-indicator {
            display: none;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }
        
        .typing-dots {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            background: #f5f5f5;
            border-radius: 12px;
        }
        
        .typing-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Markdown 内容样式 */
        .markdown-content {
            line-height: 1.6;
        }
        
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin: 16px 0 8px 0;
            font-weight: 600;
        }
        
        .markdown-content h1 { font-size: 1.3em; }
        .markdown-content h2 { font-size: 1.15em; }
        .markdown-content h3 { font-size: 1.05em; }
        
        .markdown-content ul,
        .markdown-content ol {
            margin: 12px 0;
            padding-left: 24px;
        }
        
        .markdown-content li {
            margin: 6px 0;
        }
        
        .markdown-content strong {
            font-weight: 600;
            color: #667eea;
        }
        
        .markdown-content em {
            font-style: italic;
        }
        
        .markdown-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        
        .markdown-content pre {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }
        
        .markdown-content blockquote {
            border-left: 3px solid #667eea;
            padding-left: 12px;
            margin: 12px 0;
            color: #666;
        }
        
        .markdown-content a {
            color: #667eea;
            text-decoration: none;
        }
        
        .markdown-content a:hover {
            text-decoration: underline;
        }
    </style>
  <script type="module" crossorigin src="../assets/assistant/index-u7j7r_8E.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/FavoriteService-CqGqGpov.js">
  <link rel="modulepreload" crossorigin href="../assets/modulepreload-polyfill-eJgYjmQ8.js">
  <link rel="modulepreload" crossorigin href="../assets/SessionService-DiyLwdS-.js">
  <link rel="stylesheet" crossorigin href="../assets/shell-9ygW22hc.css">
</head>
<body>
    <div class="glass-container" style="height: 100vh; overflow: hidden;">
        <header class="glass-header">
            <h1 class="glass-title">🤖 围棋 AI 助理</h1>
            <p class="glass-subtitle">智能识别意图 · 自动执行操作</p>
        </header>
        <div class="glass-content" style="max-width: 520px;">
            <div class="chat-card">
                <div class="chat-messages" id="chatContainer">
                    <div class="status">
                        <span>✅</span>
                        <span id="loadingText">AI助理准备就绪，试试快捷指令或输入你的需求！</span>
                    </div>
                </div>
            </div>
            
            <!-- ChatGPT 风格输入框 -->
            <div class="input-container">
                <textarea class="input-textarea" id="userInput" placeholder="输入您想做的事，例如：下载柯洁的棋谱" disabled rows="1"></textarea>
                <div class="input-toolbar">
                    <input type="file" id="sgfUpload" accept=".sgf" style="display: none;">
                    <button class="toolbar-btn" id="sgfBtn" title="上传 SGF 文件" onclick="document.getElementById('sgfUpload').click()">
                        📄
                    </button>
                    <button class="toolbar-btn send-btn" id="sendBtn" onclick="sendMessage()" disabled title="发送">
                        ➤
                    </button>
                    <button class="toolbar-btn menu-btn" onclick="toggleCommandMenu()" title="快捷指令">
                        ⋮
                    </button>
                </div>
            </div>
            
            <!-- Command Menu -->
            <div class="command-menu-overlay" id="commandMenuOverlay" onclick="toggleCommandMenu()"></div>
            <div class="command-menu" id="commandMenu">
                <div class="command-list">
                    <div class="command-item" onclick="clearAllHistory(); toggleCommandMenu();">
                        <div class="command-icon">🗑️</div>
                        <div class="command-text">
                            <div class="command-title">清空历史</div>
                            <div class="command-desc">清空所有聊天记录</div>
                        </div>
                    </div>
                    <div class="command-item" onclick="exportHistory(); toggleCommandMenu();">
                        <div class="command-icon">📤</div>
                        <div class="command-text">
                            <div class="command-title">导出历史</div>
                            <div class="command-desc">导出所有聊天记录为 JSON 文件</div>
                        </div>
                    </div>
                    <div class="command-item" onclick="window.location.href='../home/index.html'">
                        <div class="command-icon">⊞</div>
                        <div class="command-text">
                            <div class="command-title">切换到传统模式</div>
                            <div class="command-desc">使用应用风格的首页</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../shared/error-catch.js"></script>
</body>
</html>
