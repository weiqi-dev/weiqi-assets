<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Sniffer 测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            font-size: 14px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #58a6ff; margin-bottom: 20px; }
        
        .controls {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        label { color: #8b949e; min-width: 80px; }
        input[type="text"], input[type="number"] {
            flex: 1;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 14px;
        }
        input[type="number"] { max-width: 120px; }
        
        .buttons {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #21262d;
            color: #c9d1d9;
            transition: all 0.2s;
        }
        button:hover { background: #30363d; }
        button.primary { background: #238636; border-color: #238636; color: white; }
        button.primary:hover { background: #2ea043; }
        button.danger { background: #da3633; border-color: #da3633; color: white; }
        button.danger:hover { background: #f85149; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .status {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-text { font-size: 16px; }
        .status-text.running { color: #3fb950; }
        .status-text.stopped { color: #f85149; }
        .stats { display: flex; gap: 20px; color: #8b949e; }
        
        .logs {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
        }
        .logs h2 { color: #58a6ff; font-size: 16px; margin-bottom: 15px; }
        .log-entry {
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 4px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.6;
            word-break: break-all;
        }
        .log-entry:hover { background: #21262d; }
        .log-time { color: #6e7681; margin-right: 10px; }
        .log-type { font-weight: 600; margin-right: 10px; padding: 2px 6px; border-radius: 3px; }
        .log-type-open { color: #3fb950; background: #3fb95020; }
        .log-type-send { color: #58a6ff; background: #58a6ff20; }
        .log-type-receive { color: #a371f7; background: #a371f720; }
        .log-type-close { color: #f85149; background: #f8514920; }
        .log-type-error { color: #f85149; background: #f8514940; }
        .log-url { color: #8b949e; margin-right: 10px; }
        .log-data { color: #c9d1d9; }
        
        .empty { color: #6e7681; text-align: center; padding: 40px; }
        
        .json-view {
            background: #0d1117;
            border-radius: 4px;
            padding: 10px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #c9d1d9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕸️ WebSocket Sniffer 测试</h1>
        
        <div class="controls">
            <div class="input-row">
                <label>目标URL:</label>
                <input type="text" id="urlInput" placeholder="https://example.com" value="https://">
            </div>
            <div class="input-row">
                <label>超时(秒):</label>
                <input type="number" id="timeoutInput" value="30" min="5" max="120">
            </div>
            <div class="buttons">
                <button id="startBtn" class="primary" onclick="startSniffer()">▶ 开始抓包</button>
                <button id="stopBtn" class="danger" onclick="stopSniffer()" disabled>⏹ 停止</button>
                <button onclick="clearLogs()">🗑 清空</button>
            </div>
        </div>
        
        <div class="status">
            <span class="status-text stopped" id="statusText">⏹ 未开始</span>
            <div class="stats">
                <span>会话: <b id="sessionId">-</b></span>
                <span>事件: <b id="eventCount">0</b></span>
                <span>耗时: <b id="duration">0s</b></span>
            </div>
        </div>
        
        <div class="logs">
            <h2>📋 抓包日志</h2>
            <div id="logContainer">
                <div class="empty">点击"开始抓包"启动会话</div>
            </div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let startTime = 0;
        let eventCount = 0;
        let logs = [];

        // 隐藏 iframe 用于触发 sniffer:// 协议，避免主页面进入“加载中”卡顿状态
        function fireSnifferUri(uri) {
            let f = document.getElementById('__sniffer_iframe__');
            if (!f) {
                f = document.createElement('iframe');
                f.id = '__sniffer_iframe__';
                f.style.cssText = 'position:absolute;width:0;height:0;border:0;visibility:hidden;';
                document.body.appendChild(f);
            }
            f.src = uri;
        }

        // ==================== Native 回调 ====================
        // 协议（与 MainActivity.jsCallback 严格一致）：
        //   onSnifferData(jsonStr)   — jsonStr 是 events 数组的 JSON字符串
        //   onSnifferResult(jsonStr) — jsonStr 是 { action, data, events? } 的 JSON字符串

        window.onSnifferData = function (jsonStr) {
            try {
                const events = JSON.parse(jsonStr);
                if (!Array.isArray(events)) {
                    console.warn('onSnifferData expected array, got', typeof events);
                    return;
                }
                events.forEach(addLog);
            } catch (e) {
                console.error('Failed to parse sniffer data:', e, 'raw:', jsonStr);
            }
        };

        window.onSnifferResult = function (jsonStr) {
            let payload;
            try {
                payload = JSON.parse(jsonStr);
            } catch (e) {
                console.error('Failed to parse sniffer result:', e, 'raw:', jsonStr);
                return;
            }
            const action = payload && payload.action;
            const data = payload && payload.data;
            console.log('Sniffer result:', action, data, payload);

            switch (action) {
                case 'started':
                    updateStatus('running', `🟢 抓包中... [${data}]`);
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    break;
                case 'stopped':
                case 'flushed':
                case 'completed': {
                    const evCount = (payload && typeof payload.events === 'number') ? `，共 ${payload.events} 条` : '';
                    updateStatus('stopped', `⏹ ${action}：${data}${evCount}`);
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = true;
                    currentSessionId = null;
                    if (window.durationTimer) { clearInterval(window.durationTimer); window.durationTimer = null; }
                    break;
                }
                case 'timeout':
                    updateStatus('stopped', `⏹ 超时 [${data}]`);
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = true;
                    currentSessionId = null;
                    if (window.durationTimer) { clearInterval(window.durationTimer); window.durationTimer = null; }
                    break;
                case 'error':
                    updateStatus('stopped', `❌ 错误：${data}`);
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = true;
                    currentSessionId = null;
                    if (window.durationTimer) { clearInterval(window.durationTimer); window.durationTimer = null; }
                    break;
                case 'status':
                    console.log('running sessions:', data);
                    break;
                default:
                    console.warn('unknown sniffer action:', action, payload);
            }
        };

        function startSniffer() {
            const url = document.getElementById('urlInput').value.trim();
            const timeout = parseInt(document.getElementById('timeoutInput').value, 10) * 1000;

            if (!url || !/^https?:\/\//i.test(url)) {
                alert('请输入有效的 http(s) URL');
                return;
            }

            // 清空之前的数据
            clearLogs();

            currentSessionId = 'test_' + Date.now();
            startTime = Date.now();
            eventCount = 0;

            document.getElementById('sessionId').textContent = currentSessionId;
            updateStatus('running', `🟡 启动中... [${currentSessionId}]`);
            document.getElementById('startBtn').disabled = true;
            updateDuration();

            // 通过隐藏 iframe 触发，不会让主页面“加载中”
            fireSnifferUri(
                `sniffer://start?id=${encodeURIComponent(currentSessionId)}` +
                `&url=${encodeURIComponent(url)}` +
                `&timeout=${timeout}`
            );

            // 定时更新耗时
            if (window.durationTimer) clearInterval(window.durationTimer);
            window.durationTimer = setInterval(updateDuration, 1000);
        }

        function stopSniffer() {
            if (!currentSessionId) return;
            fireSnifferUri(`sniffer://stop?id=${encodeURIComponent(currentSessionId)}`);
            if (window.durationTimer) { clearInterval(window.durationTimer); window.durationTimer = null; }
        }
        
        function addLog(event) {
            eventCount++;
            document.getElementById('eventCount').textContent = eventCount;
            
            const container = document.getElementById('logContainer');
            
            // 移除 empty 提示
            if (container.querySelector('.empty')) {
                container.innerHTML = '';
            }
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = new Date(event.ts).toLocaleTimeString('zh-CN');
            const typeClass = `log-type-${event.t}`;
            const typeText = event.t.toUpperCase();
            
            let dataHtml = '';
            if (event.d) {
                if (typeof event.d === 'string') {
                    dataHtml = `<span class="log-data">${escapeHtml(event.d.substring(0, 200))}${event.d.length > 200 ? '...' : ''}</span>`;
                } else {
                    dataHtml = `<div class="json-view">${escapeHtml(JSON.stringify(event.d, null, 2))}</div>`;
                }
            }
            
            entry.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-type ${typeClass}">${typeText}</span>
                <span class="log-url">${escapeHtml(event.u)}</span>
                ${dataHtml}
            `;
            
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            
            logs.push(event);
        }
        
        function clearLogs() {
            logs = [];
            eventCount = 0;
            document.getElementById('eventCount').textContent = '0';
            document.getElementById('logContainer').innerHTML = '<div class="empty">点击"开始抓包"启动会话</div>';
        }
        
        function updateStatus(state, text) {
            const statusEl = document.getElementById('statusText');
            statusEl.className = `status-text ${state}`;
            statusEl.textContent = text;
        }
        
        function updateDuration() {
            if (!startTime) return;
            const seconds = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('duration').textContent = seconds + 's';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 页面卸载时停止会话（用 iframe 触发，避免 navigation 被中断）
        window.addEventListener('beforeunload', () => {
            if (currentSessionId) {
                try { fireSnifferUri(`sniffer://stop?id=${encodeURIComponent(currentSessionId)}`); } catch (e) {}
            }
        });
    </script>
</body>
</html>
