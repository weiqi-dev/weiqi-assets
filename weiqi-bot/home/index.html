<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抓包调试工具 v4</title>
    <script src="../shared/sniffer-debug.js"></script>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #0f0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .input-section {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            font-family: monospace;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-family: monospace;
            background: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #0c0;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .log-section {
            background: #000;
            border: 1px solid #0f0;
            padding: 10px;
            height: 500px;
            overflow-y: auto;
            font-size: 14px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #333;
        }
        .log-time {
            color: #888;
        }
        .log-info {
            color: #0f0;
        }
        .log-error {
            color: #f00;
        }
        .log-warn {
            color: #ff0;
        }
        .log-data {
            color: #0ff;
            word-break: break-all;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border: 1px solid #0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 抓包调试工具 v4（无遮罩版）</h1>

        <div class="input-section">
            <input type="text" id="urlInput" placeholder="粘贴 URL..." />
        </div>

        <div class="input-section">
            <button id="fetchBtn" onclick="startFetch()">开始抓包</button>
            <button id="clearBtn" onclick="clearLog()">清除日志</button>
            <button id="checkBtn" onclick="checkEnvironment()">检查环境</button>
        </div>

        <div class="status" id="status">
            状态: 就绪
        </div>

        <div class="log-section" id="logSection">
            <div class="log-entry">
                <span class="log-time">[系统]</span>
                <span class="log-info">调试工具已加载，等待输入...</span>
            </div>
        </div>
    </div>

    <script>
        // 日志函数
        function log(message, type = 'info') {
            const logSection = document.getElementById('logSection');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
            logSection.appendChild(entry);
            logSection.scrollTop = logSection.scrollHeight;
            console.log(`[${type}] ${message}`);
        }

        function setStatus(text) {
            document.getElementById('status').innerHTML = `状态: ${text}`;
        }

        function clearLog() {
            document.getElementById('logSection').innerHTML = '';
            log('日志已清除');
        }

        // 检查环境
        function checkEnvironment() {
            log('=== 环境检查 ===', 'info');
            log('window.onSnifferData 存在: ' + !!(window.onSnifferData), 'info');
            log('window.onSnifferResult 存在: ' + !!(window.onSnifferResult), 'info');
            log('=== 环境检查完成 ===', 'info');
        }

        // 开始抓包
        async function startFetch() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();

            if (!url) {
                log('请输入 URL', 'error');
                return;
            }

            log('开始抓包: ' + url, 'info');
            setStatus('正在抓包...');

            const fetchBtn = document.getElementById('fetchBtn');
            fetchBtn.disabled = true;

            try {
                // 生成会话 ID
                const sessionId = `debug-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
                log('会话 ID: ' + sessionId, 'info');

                // 检查回调函数
                log('检查回调函数...', 'info');
                log('window.onSnifferData: ' + (typeof window.onSnifferData), 'info');
                log('window.onSnifferResult: ' + (typeof window.onSnifferResult), 'info');

                if (!window.onSnifferData) {
                    log('⚠️ window.onSnifferData 不存在！', 'warn');
                }
                if (!window.onSnifferResult) {
                    log('⚠️ window.onSnifferResult 不存在！', 'warn');
                }

                // 注册回调监控
                let callbackReceived = false;
                const originalOnSnifferResult = window.onSnifferResult;
                window.onSnifferResult = function(json) {
                    callbackReceived = true;
                    log('✅ onSnifferResult 被调用！！！', 'info');
                    log('数据: ' + json, 'info');
                    
                    if (originalOnSnifferResult) {
                        originalOnSnifferResult.call(window, json);
                    }
                };

                const originalOnSnifferData = window.onSnifferData;
                window.onSnifferData = function(json) {
                    callbackReceived = true;
                    log('✅ onSnifferData 被调用！！！', 'info');
                    log('数据: ' + json.substring(0, 100), 'info');
                    
                    if (originalOnSnifferData) {
                        originalOnSnifferData.call(window, json);
                    }
                };

                log('✅ 回调监控已设置', 'info');

                // 构建 sniffer:// URL
                const snifferUrl = `sniffer://start?id=${sessionId}&url=${encodeURIComponent(url)}`;
                log('调用 sniffer:// 协议', 'info');

                // 触发 sniffer://start
                window.location.href = snifferUrl;

                log('⏳ 等待回调...（超时 15 秒）', 'info');

                // 等待一段时间后检查回调
                setTimeout(() => {
                    if (!callbackReceived) {
                        log('❌ 15 秒内未收到任何回调！', 'error');
                        log('可能原因：', 'error');
                        log('1. MainActivity 的 jsCallback 调用了错误的 WebView', 'error');
                        log('2. 或者回调函数在错误的 JavaScript 环境中', 'error');
                        setStatus('未收到回调');
                    } else {
                        log('✅ 已收到回调', 'info');
                        setStatus('抓包进行中');
                    }
                    fetchBtn.disabled = false;
                }, 15000);

            } catch (e) {
                log('❌ 错误: ' + e.message, 'error');
                log(e.stack, 'error');
                setStatus('错误: ' + e.message);
                fetchBtn.disabled = false;
            }
        }

        // 页面加载完成
        log('✅ 页面加载完成');
        
        // 自动检查环境
        setTimeout(() => {
            checkEnvironment();
        }, 500);
    </script>
</body>
</html>
