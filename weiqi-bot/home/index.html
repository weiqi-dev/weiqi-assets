<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no, viewport-fit=cover">
  <title>围棋智能助手</title>
  <style>
    /* home 特有样式：棋子 logo */
    .header-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .header-logo .stone {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    .header-logo .stone:nth-child(1) { animation-delay: 0s; }
    .header-logo .stone:nth-child(3) { animation-delay: 0.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .header-logo .stone-black {
      background: radial-gradient(circle at 30% 30%, #4a4a4a, #1a1a1a);
      box-shadow: 2px 2px 8px rgba(0,0,0,0.5), inset -1px -1px 3px rgba(0,0,0,0.3);
    }

    .header-logo .stone-white {
      background: radial-gradient(circle at 30% 30%, #ffffff, #d0d0d0);
      box-shadow: 2px 2px 8px rgba(0,0,0,0.3), inset -1px -1px 3px rgba(255,255,255,0.5);
    }

    /* home 特有样式：内容区域不需要 padding-top */
    .glass-content {
      padding: 0 12px 24px;
    }
    
    /* 分组标签 */
    .section-label {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 10px;
      padding-left: 2px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    /* 快捷入口卡片 - 玻璃拟态 */
    .quick-entry-card {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .quick-entry-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .quick-entry-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      border-color: rgba(255,255,255,0.3);
    }

    .quick-entry-card:hover::before {
      opacity: 1;
    }

    .quick-entry-card:active {
      transform: translateY(-1px);
    }

    .quick-card-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6em;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(5px);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .quick-card-content {
      flex: 1;
      margin-left: 14px;
      position: relative;
      z-index: 1;
    }

    .quick-card-title {
      font-size: 16px;
      font-weight: 500;
      color: white;
      margin-bottom: 3px;
    }

    .quick-card-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    .quick-card-arrow {
      font-size: 22px;
      color: rgba(255,255,255,0.6);
      margin-left: 8px;
      transition: transform 0.3s, color 0.3s;
      position: relative;
      z-index: 1;
    }

    .quick-entry-card:hover .quick-card-arrow {
      transform: translateX(4px);
      color: white;
    }

    /* 功能网格 - 玻璃拟态 */
    .function-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      padding: 16px 10px;
    }

    .grid-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 4px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .grid-item:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .grid-item:active {
      transform: scale(0.95);
    }

    .grid-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4em;
      margin-bottom: 6px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    .grid-label {
      font-size: 12px;
      color: white;
      text-align: center;
      font-weight: 400;
    }

    /* 功能网格配色 - 提高亮度 */
    .grid-icon.assistant { background: linear-gradient(135deg, #AB47BC 0%, #8E24AA 100%); }
    .grid-icon.player { background: linear-gradient(135deg, #42A5F5 0%, #1E88E5 100%); }
    .grid-icon.opponent { background: linear-gradient(135deg, #EC407A 0%, #D81B60 100%); }
    .grid-icon.event { background: linear-gradient(135deg, #FFA726 0%, #FB8C00 100%); }
    .grid-icon.decision { background: linear-gradient(135deg, #EF5350 0%, #E53935 100%); }

    /* 动画 */
    .quick-entry-card {
      animation: fadeInUp 0.5s ease-out;
    }

    .quick-entry-card:nth-child(1) { animation-delay: 0.1s; }
    .quick-entry-card:nth-child(2) { animation-delay: 0.15s; }
    .quick-entry-card:nth-child(3) { animation-delay: 0.2s; }
    .quick-entry-card:nth-child(4) { animation-delay: 0.25s; }

    .function-grid {
      animation: fadeInUp 0.5s ease-out 0.3s backwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 涟漪动画 */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* 响应式 */
    @media (max-width: 360px) {
      .function-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .header-title {
        font-size: 1.7em;
      }
    }
  </style>
  <script type="module" crossorigin src="../assets/home/index-D6tJ71gB.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/FavoriteService-D-_Lo8Jb.js">
  <link rel="modulepreload" crossorigin href="../assets/modulepreload-polyfill-BVSDYCMZ.js">

  <link rel="stylesheet" crossorigin href="../assets/shell-DFcqW_O4.css">
</head>
<body>
  <div class="glass-container">
    <header class="glass-header">
      <div class="header-logo">
        <span class="stone stone-black"></span>
        <h1 class="glass-title">围棋助手</h1>
        <span class="stone stone-white"></span>
      </div>
      <p class="glass-subtitle" id="greeting"></p>
    </header>
    <div class="glass-content">
      <div id="page-root"></div>
    </div>
  </div>
  <script src="../shared/error-catch.js"></script>
  <script>
    // 设置动态问候语
    const hour = new Date().getHours();
    let greeting = '你好';
    if (hour >= 5 && hour < 12) greeting = '早上好';
    else if (hour >= 12 && hour < 18) greeting = '下午好';
    else if (hour >= 18 || hour < 5) greeting = '晚上好';
    document.getElementById('greeting').textContent = greeting + '，准备好对弈了吗？';

    // 连续点击标题开启调试日志
    (function() {
      let clickCount = 0;
      let lastClickTime = 0;
      const CLICK_THRESHOLD = 5; // 连续点击次数
      const TIME_WINDOW = 2000; // 时间窗口（毫秒）

      const title = document.querySelector('.glass-title');
      if (!title) return;

      title.style.cursor = 'pointer';
      title.style.userSelect = 'none';
      title.style.webkitUserSelect = 'none';

      // 初始化时检查调试模式状态
      let debugMode = localStorage.getItem('KATAGO_DEBUG') === 'true';
      updateDebugIcon();

      title.addEventListener('click', function() {
        const now = Date.now();
        
        // 如果距离上次点击超过时间窗口，重置计数
        if (now - lastClickTime > TIME_WINDOW) {
          clickCount = 0;
        }
        
        clickCount++;
        lastClickTime = now;

        // 达到阈值，切换调试模式
        if (clickCount >= CLICK_THRESHOLD) {
          debugMode = !debugMode;
          localStorage.setItem('KATAGO_DEBUG', debugMode.toString());
          
          // 显示提示
          showToast(debugMode ? '🐛 调试模式已开启' : '🐛 调试模式已关闭');
          
          // 更新调试图标
          updateDebugIcon();
          
          // 重置计数
          clickCount = 0;
        }
      });

      // 更新调试图标显示
      function updateDebugIcon() {
        const functionGrid = document.querySelector('.function-grid');
        if (!functionGrid) {
          // 如果 function-grid 还不存在，延迟重试
          setTimeout(updateDebugIcon, 100);
          return;
        }

        // 查找是否已存在调试图标
        let debugItem = functionGrid.querySelector('[data-action="navigate:debug"]');

        if (debugMode) {
          // 显示调试图标
          if (!debugItem) {
            debugItem = document.createElement('div');
            debugItem.className = 'grid-item';
            debugItem.setAttribute('data-action', 'navigate:debug');
            debugItem.innerHTML = `
              <div class="grid-icon">🔧</div>
              <div class="grid-label">调试</div>
            `;
            debugItem.addEventListener('click', function() {
              window.location.href = '../debug/index.html';
            });
            functionGrid.appendChild(debugItem);
          }
        } else {
          // 隐藏调试图标
          if (debugItem) {
            debugItem.remove();
          }
        }
      }

      // Toast 提示函数
      function showToast(message) {
        // 移除已有的 toast
        const existingToast = document.querySelector('.debug-toast');
        if (existingToast) {
          existingToast.remove();
        }

        const toast = document.createElement('div');
        toast.className = 'debug-toast';
        toast.textContent = message;
        toast.style.cssText = `
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: rgba(0, 0, 0, 0.8);
          color: white;
          padding: 12px 24px;
          border-radius: 8px;
          font-size: 14px;
          z-index: 10000;
          animation: toastFadeIn 0.3s ease-out;
        `;

        // 添加动画样式
        if (!document.querySelector('#debug-toast-style')) {
          const style = document.createElement('style');
          style.id = 'debug-toast-style';
          style.textContent = `
            @keyframes toastFadeIn {
              from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
              to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            }
          `;
          document.head.appendChild(style);
        }

        document.body.appendChild(toast);

        // 2 秒后自动消失
        setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transition = 'opacity 0.3s';
          setTimeout(() => toast.remove(), 300);
        }, 2000);
      }
    })();

    // 涟漪动画
    document.addEventListener('click', function(e) {
      const target = e.target.closest('.quick-entry-card, .grid-item');
      if (!target) return;
      
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      const rect = target.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
      target.style.position = 'relative';
      target.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  </script>

</body>
</html>
