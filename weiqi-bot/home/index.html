<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抓包调试工具</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #0f0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .input-section {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            font-family: monospace;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-family: monospace;
            background: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #0c0;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .log-section {
            background: #000;
            border: 1px solid #0f0;
            padding: 10px;
            height: 600px;
            overflow-y: auto;
            font-size: 14px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #333;
        }
        .log-time {
            color: #888;
        }
        .log-info {
            color: #0f0;
        }
        .log-error {
            color: #f00;
        }
        .log-warn {
            color: #ff0;
        }
        .log-data {
            color: #0ff;
            word-break: break-all;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border: 1px solid #0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 抓包调试工具</h1>

        <div class="input-section">
            <input type="text" id="urlInput" placeholder="粘贴 URL..." />
        </div>

        <div class="input-section">
            <button id="fetchBtn" onclick="startFetch()">开始抓包</button>
            <button id="clearBtn" onclick="clearLog()">清除日志</button>
            <button id="testBtn" onclick="testCallbacks()">测试回调</button>
        </div>

        <div class="status" id="status">
            状态: 就绪
        </div>

        <div class="log-section" id="logSection">
            <div class="log-entry">
                <span class="log-time">[系统]</span>
                <span class="log-info">调试工具已加载，等待输入...</span>
            </div>
        </div>
    </div>

    <script>
        // 日志函数
        function log(message, type = 'info') {
            const logSection = document.getElementById('logSection');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
            logSection.appendChild(entry);
            logSection.scrollTop = logSection.scrollHeight;
        }

        function logData(label, data) {
            const logSection = document.getElementById('logSection');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            let displayData = data;
            if (typeof data === 'object') {
                displayData = JSON.stringify(data, null, 2);
            }
            if (displayData.length > 500) {
                displayData = displayData.substring(0, 500) + '...(已截断)';
            }
            
            entry.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="log-info">${label}:</span>
                <pre class="log-data" style="margin: 5px 0; white-space: pre-wrap;">${displayData}</pre>
            `;
            logSection.appendChild(entry);
            logSection.scrollTop = logSection.scrollHeight;
        }

        function setStatus(text) {
            document.getElementById('status').innerHTML = `状态: ${text}`;
        }

        function clearLog() {
            document.getElementById('logSection').innerHTML = '';
            log('日志已清除');
        }

        // 测试回调函数
        function testCallbacks() {
            log('测试全局回调函数...', 'info');
            
            log('window.onSnifferData 存在: ' + !!(window.onSnifferData), 'info');
            log('window.onSnifferResult 存在: ' + !!(window.onSnifferResult), 'info');

            if (window.onSnifferData) {
                const testData = JSON.stringify({
                    type: 'ws_open',
                    wsUrl: 'test://test',
                    timestamp: Date.now()
                });
                log('调用 onSnifferData...', 'info');
                try {
                    window.onSnifferData(testData);
                    log('onSnifferData 调用成功', 'info');
                } catch (e) {
                    log('onSnifferData 调用失败: ' + e.message, 'error');
                }
            }

            if (window.onSnifferResult) {
                const testResult = JSON.stringify({
                    action: 'started',
                    data: 'test-session-id'
                });
                log('调用 onSnifferResult(started)...', 'info');
                try {
                    window.onSnifferResult(testResult);
                    log('onSnifferResult(started) 调用成功', 'info');
                } catch (e) {
                    log('onSnifferResult 调用失败: ' + e.message, 'error');
                }
            }
        }

        // 开始抓包
        async function startFetch() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();

            if (!url) {
                log('请输入 URL', 'error');
                return;
            }

            log('开始抓包: ' + url, 'info');
            setStatus('正在抓包...');

            const fetchBtn = document.getElementById('fetchBtn');
            fetchBtn.disabled = true;

            try {
                // 生成会话 ID
                const sessionId = `debug-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
                log('会话 ID: ' + sessionId, 'info');

                // 收集消息的数组
                const messages = [];
                let resolveWait = null;
                let status = 'running';

                // 注册全局回调
                log('注册全局回调函数...', 'info');

                window.onSnifferData = function(json) {
                    log('📥 onSnifferData 被调用', 'info');
                    logData('原始数据', json);

                    try {
                        const data = JSON.parse(json);
                        messages.push(data);
                        logData('解析后的数据', data);
                    } catch (e) {
                        log('解析数据失败: ' + e.message, 'error');
                    }
                };

                window.onSnifferResult = function(json) {
                    log('📥 onSnifferResult 被调用', 'info');
                    logData('原始数据', json);

                    try {
                        const result = JSON.parse(json);
                        logData('解析后的结果', result);

                        const action = result.action || '';
                        const data = result.data || '';

                        if (action === 'started') {
                            log('✅ 抓包已启动: ' + data, 'info');
                        } else if (action === 'stopped') {
                            log('🛑 抓包已停止: ' + data, 'info');
                            status = 'stopped';
                            if (resolveWait) {
                                resolveWait({
                                    success: true,
                                    sessionId: sessionId,
                                    messages: messages
                                });
                                resolveWait = null;
                            }
                        } else if (action === 'error') {
                            log('❌ 抓包错误: ' + data, 'error');
                            status = 'error';
                            if (resolveWait) {
                                resolveWait({
                                    success: false,
                                    error: data,
                                    messages: messages
                                });
                                resolveWait = null;
                            }
                        }
                    } catch (e) {
                        log('解析结果失败: ' + e.message, 'error');
                    }
                };

                log('✅ 回调函数已注册', 'info');

                // 构建 sniffer:// URL
                const snifferUrl = `sniffer://start?id=${sessionId}&url=${encodeURIComponent(url)}`;
                log('调用 sniffer:// 协议: ' + snifferUrl, 'info');

                // 触发 sniffer://start
                window.location.href = snifferUrl;

                log('⏳ 等待回调...', 'info');

                // 等待结果（超时 15 秒）
                const result = await new Promise((resolve) => {
                    const timer = setTimeout(() => {
                        log('⏰ 等待超时（15秒）', 'warn');
                        resolve({
                            success: false,
                            error: '等待超时',
                            messages: messages
                        });
                    }, 15000);

                    resolveWait = (result) => {
                        clearTimeout(timer);
                        resolve(result);
                    };
                });

                log('📊 抓包结果:', 'info');
                logData('结果', result);
                log(`捕获消息数: ${result.messages.length}`, 'info');

                // 分析消息
                let gameDataFound = false;
                for (const msg of result.messages) {
                    if (msg.type === 'ws_receive' && msg.data) {
                        try {
                            const data = JSON.parse(msg.data);
                            if (data.cmd === '6' || data.cmd === '2') {
                                log('🎮 找到游戏数据! cmd=' + data.cmd, 'info');
                                gameDataFound = true;
                                logData('游戏数据', data.data);
                            }
                        } catch (e) {
                            // 忽略
                        }
                    }
                }

                if (!gameDataFound) {
                    log('⚠️ 未找到游戏数据（cmd:6 或 cmd:2）', 'warn');
                }

                if (result.success) {
                    setStatus('抓包成功');
                } else {
                    setStatus('抓包失败: ' + result.error);
                }

            } catch (e) {
                log('❌ 错误: ' + e.message, 'error');
                log(e.stack, 'error');
                setStatus('错误: ' + e.message);
            } finally {
                fetchBtn.disabled = false;
            }
        }

        // 页面加载完成
        log('✅ 页面加载完成');
        log('提示: 点击"测试回调"检查回调函数是否可用');
    </script>
</body>
</html>
