# KataGo Analysis Config (for Android app)
# 精简配置，适配手机环境
# TS 层可以通过 overrideSettings 覆盖这些参数

# ========== 日志 ==========
logSearchInfo = false
logTimingInfo = false
logMovesInfo = false

# ========== 后端 ==========
# OpenCL GPU 加速
numNNEvalThreadsPerModel = 1
numNNCacheThreadsPerModel = 0
nnMaxBatchSize = 1

# ========== 搜索参数 ==========
# 手机 CPU 线程数
numSearchThreads = 4

# 分析线程数（同时分析的局面数）
numAnalysisThreads = 1

# NN 缓存
nnCacheSizePowerOfTwo = 19

# 每次搜索最大访问数（TS 层可通过 maxVisits 覆盖）
maxVisits = 200

# 最大搜索时间（秒，TS 层可通过 maxTime 覆盖）
maxTime = 10.0

# ========== 分析输出 ==========
# 报告 PV 长度
analysisPVLen = 15

# 包含胜率信息
reportAnalysisWinratesAs = BLACK

# ========== 模型 ==========
# 模型路径由启动参数 -model 指定，这里不需要配置
