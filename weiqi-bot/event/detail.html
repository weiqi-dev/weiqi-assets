<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>赛事详情 - 围棋智能助手</title>
  <style>
    /* detail 特有样式 */
    
    /* 覆盖容器宽度 */
    .glass-content {
      max-width: 100%;
      padding: 0 12px 20px;
    }
    @media (min-width: 768px) {
      .glass-content {
        max-width: 800px;
      }
    }

    /* 白色大面板 */
    .event-detail-group {
      background: rgba(255,255,255,0.9);
      border-radius: 8px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      display: none; /* 默认隐藏 */
    }
    
    /* 有内容时显示 */
    .event-detail-group.has-content {
      display: block;
    }

    /* 隐藏内容为空 web-card（防止 opponentCard 等空卡片显示） */
    .web-card:has(.web-card__body:empty) {
      display: none !important;
    }

    /* ===== 面板头部，完全照搬 events.html ===== */
    .detail-header {
      background: #f8f9fa;
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
    }

    /* ===== 筛选标签区域，完全照搬 ===== */
    .detail-tabs {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: nowrap;
      align-items: center;
    }
    .detail-tabs::-webkit-scrollbar { display: none; }

    /* ===== 手机屏幕下优化 ===== */
    @media (max-width: 480px) {
      .detail-tabs select {
        max-width: 120px !important;
      }
    }

    /* ===== 筛选按钮，完全照搬 events.html ===== */
    .detail-tab {
      padding: 3px 8px;
      font-size: 0.8em;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #fff;
      color: #666;
      white-space: nowrap;
    }
    .detail-tab:hover {
      background: #e0e0e0;
    }
    .detail-tab.active {
      background: rgba(102,126,234,0.1);
      color: #667eea;
    }

    /* ===== 轮次导航 ===== */
    .round-nav {
      padding: 10px 15px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    .round-btn {
      padding: 4px 12px;
      font-size: 0.85em;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      background: white;
      transition: all 0.2s;
    }
    .round-btn:hover:not(:disabled) {
      background: #f0f0f0;
    }
    .round-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
